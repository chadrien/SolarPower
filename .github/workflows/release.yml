name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set version from tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          sed -i "s/^## Version: .*/## Version: ${VERSION}/" SolarPower/SolarPower.toc

      - name: Build install zip
        run: |
          mkdir -p dist
          cp -r SolarPower dist/
          cd dist && zip -r ../SolarPower.zip SolarPower

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: SolarPower.zip
          generate_release_notes: true
